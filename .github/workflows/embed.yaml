name: Embed

on:
  push:
    branches:
      - main
    paths:
      - embed/**
      - scripts/**
      - package.json
      - package-lock.json
      - .github/workflows/embed.yaml
  pull_request:
    branches:
      - main
    paths:
      - embed/**
      - scripts/**
      - package.json
      - package-lock.json
      - .github/workflows/embed.yaml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # @simplepdf/embed is a workspace package, so install from the root.
      - name: Install dependencies
        run: npm ci

      - name: Types
        run: npm run --workspace @simplepdf/embed test:types

      - name: Tests
        run: npm run --workspace @simplepdf/embed test

      - name: Bundle size budgets
        run: npm run --workspace @simplepdf/embed check:size

      - name: Export load
        run: npm run --workspace @simplepdf/embed check:exports

      - name: API surface
        run: npm run --workspace @simplepdf/embed check:api

      # Fails whenever the committed embed-api.json pin differs from the live
      # /embed/json manifest — re-sync the pin and `npm run generate` to fix.
      - name: Contract pin matches live manifest
        run: npm run --workspace @simplepdf/embed check:contract
